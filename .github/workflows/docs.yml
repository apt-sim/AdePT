name: Docs Build Check

on: [pull_request, push]

jobs:
  docs-build:
    name: Docs
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Show docs tool versions
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import sphinx, breathe, myst_parser; print('sphinx', sphinx.__version__); print('breathe', breathe.__version__); print('myst-parser', myst_parser.__version__)"
          DOXYGEN_VERSION=$(doxygen --version)
          echo "doxygen ${DOXYGEN_VERSION}"
          # Keep CI/local behavior aligned: docs were validated on Jammy's Doxygen 1.9.1.
          if [ "${DOXYGEN_VERSION}" != "1.9.1" ]; then
            echo "Unexpected doxygen version: ${DOXYGEN_VERSION}"
            exit 1
          fi

      - name: Generate runtime-parameters page
        run: |
          # Generator is strict by default and fails if messenger/macro/docs
          # metadata is inconsistent.
          python docs/scripts/generate_runtime_parameters.py

      - name: Build docs (warnings allowed)
        run: make -C docs html

      - name: Upload docs debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-debug
          if-no-files-found: ignore
          path: |
            /tmp/sphinx-err-*.log
            docs/_build/doxygen/xml
