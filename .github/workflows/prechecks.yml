name: Prechecks

on:
  pull_request:
  push:

jobs:
  clang-format:
    name: Clang-Format Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3

      - name: Add LLVM apt repo (Clang 19)
        run: |
          wget -O - https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          sudo add-apt-repository "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-19 main"
          sudo apt-get update

      - name: Install clang-format
        run: |
          sudo apt-get install -y clang-format-19
          clang-format-19 --version

      - name: Check formatting
        run: |
          FILES=$(git ls-files '*.cpp' '*.h' '*.cu' '*.cuh' '*.hh' '*.cc' '*.icc')
          clang-format-19 -style=file -n --Werror $FILES

  docs-build:
    name: Docs
    # Keep in sync with .readthedocs.yaml to avoid CI/RTD drift.
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Print docs tool versions
        run: |
          python -c "import sys; print(sys.version)"
          python -c "import sphinx, breathe, myst_parser; print('sphinx', sphinx.__version__); print('breathe', breathe.__version__); print('myst-parser', myst_parser.__version__)"
          python -c "import subprocess; from packaging.version import Version; v=subprocess.check_output(['doxygen','--version'], text=True).strip(); print(f'doxygen {v}'); assert Version(v) >= Version('1.9.1'), f'doxygen {v} is too old; require >= 1.9.1'"

      - name: Read the Docs pre_build parity
        run: |
          # Generator fails if messenger/macro/docs
          # metadata is inconsistent.
          python docs/scripts/generate_runtime_parameters.py
          cd docs && mkdir -p _build/doxygen && doxygen Doxyfile

      - name: Read the Docs sphinx parity
        run: sphinx-build -b html docs docs/_build/html

  reuse:
    name: REUSE Compliance Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: REUSE Compliance Check
        uses: fsfe/reuse-action@v1
