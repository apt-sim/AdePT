version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  apt_packages:
    - doxygen
  jobs:
    pre_build:
      - python3 docs/scripts/generate_runtime_parameters.py
      - cd docs && mkdir -p _build/doxygen && doxygen Doxyfile

sphinx:
  configuration: docs/conf.py

python:
  install:
    - requirements: docs/requirements.txt
